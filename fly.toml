# Fly.io configuration
# Update 'app' to your Fly.io app name after running: fly apps create <name>
app = 'ruby-llm-tutorial'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
